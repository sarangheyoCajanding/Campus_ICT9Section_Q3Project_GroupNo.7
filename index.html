<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>eSakayMo | Smart Fare Guide</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="home-page">

<nav class="navbar navbar-dark px-4">
  <span class="navbar-brand fw-bold">eSakayMo</span>
  <div>
    <a href="index.html" class="btn btn-outline-info me-2">Home</a>
    <a href="registration.html" class="btn btn-outline-info">Create Account</a>
  </div>
</nav>

<div class="overlay">
  <div class="container tech-card text-center">

    <h1 class="mb-2">Smart Fare Matrix</h1>
    <p class="text-light">Select your pickup and destination</p>

    <div class="row mt-4">
      <div class="col-md-6 mb-3">
        <select id="startPoint" class="form-select">
          <option value="0">Fairview</option>
          <option value="5">Zabarte</option>
          <option value="10">SM North</option>
          <option value="15">Cubao</option>
          <option value="20">Ortigas</option>
          <option value="25">Makati</option>
          <option value="30">Taft Avenue</option>
        </select>
      </div>
      <div class="col-md-6 mb-3">
        <select id="endPoint" class="form-select">
          <option value="0">Fairview</option>
          <option value="5">Zabarte</option>
          <option value="10">SM North</option>
          <option value="15">Cubao</option>
          <option value="20">Ortigas</option>
          <option value="25">Makati</option>
          <option value="30">Taft Avenue</option>
        </select>
      </div>
    </div>

    <input type="number" id="customKM" class="form-control mt-2" placeholder="Extra km (optional)">

    <div class="form-check text-start mt-2">
      <input class="form-check-input" type="checkbox" id="discountBox">
      <label class="form-check-label text-white">Apply 20% Discount</label>
    </div>

    <div class="mt-3 d-flex gap-2">
      <button class="btn btn-light w-50" onclick="computeTotal(false)">Original Price</button>
      <button class="btn btn-info w-50" onclick="computeTotal(true)">Apply Discount</button>
    </div>

    <h3 class="mt-4 text-white" id="fareOutput">₱ 0.00</h3>

    <div class="map-container mt-4">
      <iframe 
        src="https://maps.google.com/maps?q=metro manila&t=&z=11&ie=UTF8&iwloc=&output=embed"
        width="100%" height="250" style="border:0;">
      </iframe>
    </div>

  </div>
</div>

<footer>
Mandy Cajanding & Mateo Salacup | 9-Sapphire | Source: w3schools.com
</footer>

<script src="proj.js"></script>
</body>
</html>
