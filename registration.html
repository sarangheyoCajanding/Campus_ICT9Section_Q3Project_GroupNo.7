<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>eSakayMo | Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="registration-page">

<nav class="navbar navbar-dark px-4">
  <span class="navbar-brand fw-bold">eSakayMo</span>
  <div>
    <a href="index.html" class="btn btn-outline-info me-2">Home</a>
    <a href="registration.html" class="btn btn-outline-info">Create Account</a>
  </div>
</nav>

<div class="overlay">
  <div class="container d-flex justify-content-center">

    <div class="account-card shadow-lg">

      <h2 class="text-center mb-3">Create Your eSakayMo Account</h2>

      <div class="row g-3">
        <div class="col-md-4 text-center">
          <img src="https://via.placeholder.com/120" id="preview" class="profile-pic mb-2">
          <input type="file" class="form-control mb-2" id="photo">
          <button class="btn btn-success w-100" onclick="uploadPhoto()">Upload Photo</button>
        </div>

        <div class="col-md-8">
          <input type="text" id="fname" class="form-control mb-2" placeholder="First Name">
          <input type="text" id="lname" class="form-control mb-2" placeholder="Last Name">
          <input type="number" id="age" class="form-control mb-2" placeholder="Age">
          <input type="text" id="contact" class="form-control mb-2" placeholder="Contact Number">
          <input type="email" id="email" class="form-control mb-2" placeholder="Email">
          <input type="text" id="address" class="form-control mb-2" placeholder="Address">
          <input type="text" id="username" class="form-control mb-2" placeholder="Username">
          <input type="password" id="password" class="form-control mb-3" placeholder="Password">

          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="terms">
            <label class="form-check-label">
              I accept the <a href="https://www.w3schools.com" target="_blank">Terms & Privacy Policy</a>
            </label>
          </div>

          <button class="btn btn-success w-100 mb-2" onclick="createAccount()">Create My Account</button>
          <button class="btn btn-secondary w-100" onclick="cancelForm()">Cancel</button>
        </div>
      </div>

    </div>
  </div>
</div>

<footer>
Mandy Cajanding & Mateo Salacup | 9-Sapphire | Source: w3schools.com
</footer>

<div class="modal fade" id="msgModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Message</h5></div>
      <div class="modal-body" id="modalText"></div>
      <div class="modal-footer">
        <button class="btn btn-success" data-bs-dismiss="modal">OK</button>
      </div>
    </div>
  </div>
</div>

<script>
function uploadPhoto() {
  let file = photo.files[0];
  if(file) { preview.src = URL.createObjectURL(file); showMessage("Your profile pic has been uploaded."); }
}

function createAccount() {
  if(terms.checked && fname.value !== "") {
    showMessage("Account created! Welcome, " + fname.value + "!");
    setTimeout(()=>{ window.location.href = "confirmation.html"; }, 2000);
  } else { showMessage("Please complete the form and accept the terms."); }
}

function cancelForm() { showMessage("Registration cancelled."); }

function showMessage(text) {
  modalText.innerText = text;
  new bootstrap.Modal(msgModal).show();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
